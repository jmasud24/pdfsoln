<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to PNG - Convert PDF Pages to PNG Images Online | One Page Tools</title>
    <!-- Linking Master CSS -->
    <link rel="stylesheet" href="../style.css">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        .loader {
            display: none;
            margin: 20px 0;
            font-weight: bold;
            color: var(--primary-red);
            text-align: center;
        }

        /* Preview Grid for converted images */
        #previewArea {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .img-card {
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .img-card img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        .download-single {
            display: inline-block;
            margin-top: 10px;
            font-size: 12px;
            color: var(--primary-red);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header id="header-placeholder"></header>

    <div class="ad-container">
        Advertisement Placeholder (728x90)
    </div>

    <div class="tool-wrapper" style="max-width: 1000px;">
        <div class="tool-box">
            <h1>PDF to PNG</h1>
            <p>Convert each PDF page into a high-quality transparent PNG image instantly.</p>

            <!-- File Upload Area -->
            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <p id="uploadStatus">Click or Drag PDF here</p>
                <input type="file" id="fileInput" hidden accept=".pdf">
            </div>

            <div id="loader" class="loader">Converting pages to PNG, please wait... <span id="progress">0%</span></div>

            <button id="processBtn" class="btn-process" disabled onclick="convertToPng()">Convert to PNG</button>
            
            <div id="outputArea"></div>

            <!-- Previews will appear here -->
            <div id="previewArea"></div>
        </div>
    </div>

    <div class="ad-container">
        Advertisement Placeholder (728x90)
    </div>

    <div id="footer-placeholder"></div>

    <!-- Script to Load Header and Footer Components -->
    <script src="../components/components.js"></script>

    <!-- PDF to PNG Logic -->
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        let selectedFile = null;
        let pdfData = null;

        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('processBtn');

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                pdfData = await file.arrayBuffer();
                document.getElementById('uploadStatus').innerText = "Selected: " + file.name;
                processBtn.disabled = false;
                // Clear previous results
                document.getElementById('previewArea').innerHTML = "";
                document.getElementById('outputArea').innerHTML = "";
            }
        };

        async function convertToPng() {
            const loader = document.getElementById('loader');
            const progress = document.getElementById('progress');
            const previewArea = document.getElementById('previewArea');
            const outputArea = document.getElementById('outputArea');
            const zip = new JSZip();
            
            processBtn.disabled = true;
            loader.style.display = 'block';
            previewArea.innerHTML = "";
            outputArea.innerHTML = "";

            try {
                const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
                const totalPages = pdf.numPages;

                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 }); // High quality scale
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    
                    // Convert canvas to PNG Data URL
                    const imgData = canvas.toDataURL('image/png');
                    
                    // Add to ZIP (removing data:image/png;base64, prefix)
                    const base64Data = imgData.replace(/^data:image\/(png|jpg);base64,/, "");
                    zip.file(`page-${i}.png`, base64Data, { base64: true });

                    // Add to Preview Grid
                    const card = document.createElement('div');
                    card.className = 'img-card';
                    card.innerHTML = `
                        <img src="${imgData}" alt="Page ${i}">
                        <a href="${imgData}" download="page-${i}.png" class="download-single">Download Page ${i}</a>
                    `;
                    previewArea.appendChild(card);

                    // Update Progress
                    progress.innerText = Math.round((i / totalPages) * 100) + "%";
                }

                // Generate ZIP File
                const zipContent = await zip.generateAsync({ type: "blob" });
                const zipUrl = URL.createObjectURL(zipContent);

                outputArea.innerHTML = `
                    <div style="margin: 20px 0; padding: 20px; background: #e8f5e9; border-radius: 10px; border: 1px solid #28a745; text-align: center;">
                        <p style="color:#28a745; font-weight:bold; margin-bottom:15px;">All pages converted successfully!</p>
                        <a href="${zipUrl}" download="converted_pages.zip" class="btn-process btn-success" style="text-decoration:none; display:inline-block; width:auto; padding: 15px 40px;">Download All as ZIP</a>
                    </div>
                `;

            } catch (err) {
                console.error(err);
                alert("Error: Could not convert PDF to PNG. Please try a different file.");
            } finally {
                loader.style.display = 'none';
                processBtn.disabled = false;
            }
        }

        // Drag and Drop
        const dropZone = document.getElementById('dropZone');
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => { dropZone.classList.remove('dragover'); };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            fileInput.dispatchEvent(new Event('change'));
        };
    </script>
</body>
</html>
