<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split PDF - One Page Tools</title>
    <link rel="stylesheet" href="../style.css">
    <!-- PDF-Lib Library -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        .tool-container { max-width: 800px; margin: 50px auto; padding: 20px; }
        .input-group { margin-top: 20px; text-align: left; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; }
    </style>
</head>
<body>
    <header id="header-placeholder"></header>
<div class="ad-container">
        Advertisement Placeholder (728x90)
    </div>
    <main class="tool-wrapper">
        <div class="tool-box">
            <h1>Split PDF</h1>
            <p>Extract specific pages from your PDF file instantly.</p>

            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <p id="uploadText">Click to select a PDF file</p>
                <input type="file" id="fileInput" hidden accept=".pdf">
            </div>

            <div class="input-group">
                <label>Page Range (e.g., 1-2 or 3,5,8):</label>
                <input type="text" id="pageRange" placeholder="Example: 1-3">
            </div>

            <button id="processBtn" class="btn-process" style="margin-top:20px;" disabled>Split & Download</button>
            <div id="output"></div>
        </div>
    </main>
    <div class="ad-container">
        Advertisement Placeholder (728x90)
    </div>
    <div id="footer-placeholder"></div>
<script src="../components/components.js"></script>

    <script>
        const { PDFDocument } = PDFLib;
        let selectedFile = null;

        document.getElementById('fileInput').onchange = (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                document.getElementById('uploadText').innerText = "File Selected: " + selectedFile.name;
                document.getElementById('processBtn').disabled = false;
            }
        };

        document.getElementById('processBtn').onclick = async () => {
            const rangeInput = document.getElementById('pageRange').value;
            if(!rangeInput) { alert("Please enter a page range"); return; }

            document.getElementById('processBtn').innerText = "Processing...";
            
            try {
                const existingPdfBytes = await selectedFile.arrayBuffer();
                const pdfDoc = await PDFDocument.load(existingPdfBytes);
                const newPdf = await PDFDocument.create();

                // Simple range parser (supports 1-3 format)
                const rangeParts = rangeInput.split('-');
                const start = parseInt(rangeParts[0]) - 1;
                const end = parseInt(rangeParts[1]) - 1;

                const pages = await newPdf.copyPages(pdfDoc, Array.from({length: (end - start + 1)}, (_, i) => start + i));
                pages.forEach(page => newPdf.addPage(page));

                const pdfBytes = await newPdf.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                document.getElementById('output').innerHTML = `
                    <a href="${url}" download="split_result.pdf" class="btn-process" style="display:block; background:#28a745; margin-top:20px; text-decoration:none;">Download Split PDF</a>
                `;
            } catch (err) {
                alert("Error: Please check the page range or file.");
            }
            document.getElementById('processBtn').innerText = "Split & Download";
        };
    </script>
</body>
</html>
